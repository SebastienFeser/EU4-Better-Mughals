l_english:
 mughal_indian_ocean_trade:0 "Guardians of the Sacred Routes"
 mughal_indian_ocean_trade_desc:0 "The ports of Surat and the Indian coast are the lifeline of our empire, funneling the riches of the Indian Ocean trade and carrying the faithful on their sacred pilgrimage to Mecca. Our fleet, commanded by the loyal Siddis of Janjira, shall protect these waters with coastal galleys and ensure that no foreign power disrupts the flow of commerce and devotion."
